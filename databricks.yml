# ════════════════════════════════════════════════════════════════
# DATABRICKS ASSET BUNDLES (DABs) — Bundle Configuration
# ════════════════════════════════════════════════════════════════
#
# WHAT IS THIS FILE?
#
# This is the "infrastructure as code" for your Databricks deployment.
# It tells the `databricks bundle deploy` command:
#   - WHAT to deploy (notebooks, wheels, jobs, DLT pipelines)
#   - WHERE to deploy it (which workspace, which path)
#   - HOW to configure it (cluster size, schedule, permissions)
#
# Think of it like a Dockerfile, but for Databricks:
#   Dockerfile → describes how to build a container
#   databricks.yml → describes how to deploy a pipeline
#
# ════════════════════════════════════════════════════════════════

bundle:
  name: ecommerce-pipeline

# ─── ARTIFACTS ───
# Package your src/ code as a Python wheel.
# This wheel gets installed on the cluster automatically.
artifacts:
  ecommerce_pipeline_wheel:
    type: whl
    path: .   # Build from the project root (uses pyproject.toml)

# ─── RESOURCES ───
# Define the Databricks resources to create/manage.
resources:

  # ── Databricks Workflow (Job) ──
  # This creates a multi-task DAG in the Databricks Jobs UI.
  jobs:
    ecommerce_pipeline:
      name: "ecommerce_pipeline_${bundle.target}"
      # Schedule: Run daily at 6:00 AM IST
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "Asia/Kolkata"

      # Email on failure
      email_notifications:
        on_failure:
          - "${var.alert_email}"

      # Retry configuration
      max_retries: 2
      retry_on_timeout: true

      # ── Task definitions ──
      # Tasks run in dependency order (like an Airflow DAG)
      tasks:
        # Task 1: Bronze Ingestion
        - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ./notebooks/01_bronze_ingestion.py
            base_parameters:
              environment: "${bundle.target}"
          libraries:
            - whl: ./dist/*.whl
          job_cluster_key: pipeline_cluster

        # Task 2: Silver Transformation (depends on Bronze)
        - task_key: silver_transformation
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ./notebooks/02_silver_transformations.py
            base_parameters:
              environment: "${bundle.target}"
          libraries:
            - whl: ./dist/*.whl
          job_cluster_key: pipeline_cluster

        # Task 3: Gold Aggregation (depends on Silver)
        - task_key: gold_aggregation
          depends_on:
            - task_key: silver_transformation
          notebook_task:
            notebook_path: ./notebooks/03_gold_aggregations.py
            base_parameters:
              environment: "${bundle.target}"
          libraries:
            - whl: ./dist/*.whl
          job_cluster_key: pipeline_cluster

      # ── Cluster configuration ──
      job_clusters:
        - job_cluster_key: pipeline_cluster
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "${var.node_type_id}"
            num_workers: ${var.num_workers}
            spark_conf:
              spark.sql.shuffle.partitions: "auto"

  # ── DLT Pipeline ──
  pipelines:
    dlt_ecommerce:
      name: "dlt_ecommerce_${bundle.target}"
      target: "dlt_output_${bundle.target}"
      catalog: "${var.catalog}"
      libraries:
        - notebook:
            path: ./src/dlt/dlt_pipeline.py

# ─── VARIABLES ───
# Defaults that can be overridden per environment
variables:
  catalog:
    default: "brazilian-ecommerce-dev"
  alert_email:
    default: ""
  node_type_id:
    default: "i3.xlarge"
  num_workers:
    default: 0

# ─── TARGETS (Environments) ───
# Each target overrides variables for its environment.
# Deploy with: `databricks bundle deploy -t <target>`
targets:

  dev:
    mode: development    # development mode = personal workspace copy
    default: true
    workspace:
      host: ${var.databricks_host}
    variables:
      catalog: "brazilian-ecommerce-dev"
      num_workers: 0     # Single-node for dev (cheap)
      alert_email: ""

  staging:
    workspace:
      host: ${var.databricks_host}
    variables:
      catalog: "brazilian-ecommerce-staging"
      num_workers: 1     # Small cluster for staging
      alert_email: "staging-alerts@yourcompany.com"
      node_type_id: "i3.xlarge"

  prod:
    workspace:
      host: ${var.databricks_host}
    variables:
      catalog: "brazilian-ecommerce"
      num_workers: 2     # Production-sized cluster
      alert_email: "data-engineering-oncall@yourcompany.com"
      node_type_id: "i3.2xlarge"
    # In production, enforce extra permissions
    permissions:
      - level: CAN_VIEW
        group_name: "data-analysts"
      - level: CAN_MANAGE_RUN
        group_name: "data-engineers"
      - level: IS_OWNER
        service_principal_name: "pipeline-service-principal"
